version: '3.9'

services:
  # ── Redis (task queue) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: job-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ── Celery worker ────────────────────────────────────────
  celery-worker:
    build: .
    container_name: job-agent-worker
    command: celery -A backend.tasks worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - ./data:/app/data
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  # ── Celery beat (scheduler) ──────────────────────────────
  celery-beat:
    build: .
    container_name: job-agent-scheduler
    command: celery -A backend.tasks beat --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  # ── Flower (Celery monitor UI) ───────────────────────────
  flower:
    build: .
    container_name: job-agent-flower
    command: celery -A backend.tasks flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
